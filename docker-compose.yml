version: '3.8'

services:
  pathway-backend:
    build: .
    container_name: pathway-smart-parking
    ports:
      - "8000:8000"
    volumes:
      # Mount logs only (remove code mount for production)
      - ./logs:/app/logs
    environment:
      - AI_BACKEND_HOST=0.0.0.0
      - AI_BACKEND_PORT=8000
    env_file:
      - .env
    restart: unless-stopped
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - parking-network
    # Add DNS servers for external connectivity
    dns:
      - 8.8.8.8
      - 8.8.4.4
    # Add extra hosts for Next.js connection
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  parking-network:
    driver: bridge
